<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Über mich</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js" integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V" crossorigin="anonymous"></script>
    <script src="script.js" defer></script>
</head>
<body data-page="ueber-mich">

    <header hx-get="components/header.html" hx-trigger="load" hx-swap="innerHTML"></header>   

    <main>

            <h1>Über mich</h1>
            <h2>Meine Verbindung zu Japan</h2>
        
    </main> 

<section class="timeline">

    <!-- Linke Spalte -->
    <div class="left-column">

        <div class="card left">
            <img src="images/platzhalter.PNG" alt="2005">
            <div class="text">
                <h4>2005</h4>
                <p>
                    Beschreibung für das Jahr 2005.
                </p>
            </div>
        </div>

        <div class="card left">
            <img src="images/platzhalter.PNG" alt="2007">
            <div class="text">
                <h4>2007</h4>
                <p>
                    Beschreibung für das Jahr 2007.
                </p>
            </div>
        </div>

        <div class="card left">
            <img src="images/platzhalter.PNG" alt="2009">
            <div class="text">
                <h4>2009</h4>
                <p>
                    Beschreibung für das Jahr 2009.
                </p>
            </div>
        </div>

    </div>

    <!-- Mittlere Spalte -->
    <div class="timeline-center">
        <div class="line"></div>
    </div>

    <!-- Rechte Spalte -->
    <div class="right-column">

        <div class="card right">
            <div class="text">
                <h4>2006</h4>
                <p>
                    Beschreibung für das Jahr 2006.
                </p>
            </div>
            <img src="images/platzhalter.PNG" alt="2006">
        </div>

        <div class="card right">
            <div class="text">
                <h4>2008</h4>
                <p>
                    Beschreibung für das Jahr 2008.
                </p>
            </div>
            <img src="images/platzhalter.PNG" alt="2008">
        </div>

        <div class="card right">
            <div class="text">
                <h4>2010</h4>
                <p>
                    Beschreibung für das Jahr 2010.
                </p>
            </div>
            <img src="images/platzhalter.PNG" alt="2010">
        </div>

    </div>

</section>

    <div    hx-get="components/footer.html" 
            hx-trigger="load" 
            hx-swap="outerHTML">
    </div>

    
</body>
</html>
